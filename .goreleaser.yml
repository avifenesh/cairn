version: 2

before:
  hooks:
    - sh -c "cd frontend && pnpm install --frozen-lockfile && pnpm build"
    - go vet ./...
    - go test -race -count=1 -timeout 5m ./...

builds:
  - main: ./cmd/cairn
    binary: cairn
    tags:
      - embed_frontend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      cairn_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
